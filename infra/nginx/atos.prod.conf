map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream atos_backend {
    server backend:8000;
}

upstream atos_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name atos.example.com;

    ssl_certificate /etc/letsencrypt/live/atos.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atos.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://atos_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://atos_backend/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://atos_backend/ready;
        proxy_set_header Host $host;
    }

    location /live {
        proxy_pass http://atos_backend/live;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://atos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
